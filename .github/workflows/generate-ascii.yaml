name: Generage ASCII Artwork
on: push
jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v7
      
    - name: Install Cowsay Package
      run: sudo apt-get install cowsay
    
    - name: Execute cowsay script
      run: cowsay -f dragon "Run for cover, I am a DRAGON....RAWR" >> dragon.txt

    - name: Upload dragon.txt as artifact
      uses: actions/upload-artifact@v7
      with:
        name: dragon-text-file
        path: dragon.txt
    

  test_job_2:
    needs: build_job_1
    runs-on: ubuntu-latest
    steps:
    - name: Download dragon.txt artifact
      uses: actions/download-artifact@v8
      with:
        name: dragon-text-file

    - name: TEst for dragon in the file
      run: grep -i "dragon" dragon.txt

  deploy_job_1:
    needs: test_job_2
    runs-on: ubuntu-latest
    steps:
    - name: Download dragon.txt artifact
      uses: actions/download-artifact@v8
      with:
        name: dragon-text-file

    - name: Display the contents of dragon.txt
      run: cat dragon.txt

    - name: Deploy the file
      run: echo Deploying the file...

      


        